# Nginx config for the Bellagio Event's static SPA (no backend).
# Serves the Vite build output and redirects all unknown routes to
# index.html so React Router deep links work on refresh.

server {
    listen 80;
    server_name bellagioevent.com www.bellagioevent.com;

    root /var/www/bellagio/client/dist;
    index index.html;

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every other path serves the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
