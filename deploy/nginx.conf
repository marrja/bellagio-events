# Nginx config for the Bellagio Event's SPA.
# Serves the Vite build output and redirects all unknown routes to
# index.html so React Router deep links work on refresh (constraint #11).
# The Express API + Payload CMS are reverse-proxied under /api and /admin.

server {
    listen 80;
    server_name bellagioevent.com www.bellagioevent.com;

    root /var/www/bellagio/client/dist;
    index index.html;

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API → Express/Payload server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payload admin panel (served by Payload, not React)
    location /admin/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — every other path serves the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
